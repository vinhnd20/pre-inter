---
# ============================================================================
# containerd via Docker apt repo (current & secure), configured for k8s:
# SystemdCgroup=true (must match kubelet) + version-matched pause image.
#
# We generate the version-appropriate default config once, then patch the two
# keys that matter. Patching (vs. templating the whole file) is robust across
# containerd config schema changes and stays idempotent.
# ============================================================================

- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker apt GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install containerd.io
  ansible.builtin.apt:
    name: "containerd.io{{ ('=' + containerd_version) if containerd_version | length > 0 else '' }}"
    state: present
    update_cache: true

- name: Hold containerd version (when pinned)
  ansible.builtin.dpkg_selections:
    name: containerd.io
    selection: hold
  when: containerd_version | length > 0

- name: Ensure /etc/containerd exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd configuration
  # The containerd.io package ships a config.toml with `disabled_plugins =
  # ["cri"]`, which breaks kubelet. We regenerate the full default (CRI
  # enabled) every run and patch the two k8s-critical keys. `containerd config
  # default` is deterministic, so the copy below stays idempotent.
  ansible.builtin.command: containerd config default
  register: _containerd_default
  changed_when: false

- name: Write production containerd config (CRI on, SystemdCgroup, pause image)
  ansible.builtin.copy:
    dest: /etc/containerd/config.toml
    owner: root
    group: root
    mode: "0644"
    content: >-
      {{ _containerd_default.stdout
         | regex_replace('SystemdCgroup\s*=\s*\w+',
                         'SystemdCgroup = true' if containerd_systemd_cgroup else 'SystemdCgroup = false')
         | regex_replace('sandbox_image\s*=\s*["\'][^"\']*["\']',
                         'sandbox_image = "' ~ containerd_pause_image ~ '"')
         | regex_replace('(\n\s*)sandbox\s*=\s*["\'][^"\']*["\']',
                         '\1sandbox = "' ~ containerd_pause_image ~ '"') }}
  notify: Restart containerd

- name: Enable and start containerd
  ansible.builtin.systemd_service:
    name: containerd
    enabled: true
    state: started
