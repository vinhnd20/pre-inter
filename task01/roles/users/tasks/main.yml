---
# ============================================================================
# Idempotent sysadmin provisioning.
#
# Passwords are generated ONCE via the `password` lookup (persisted to a
# per-user file on the controller) so re-runs do NOT churn the password — this
# is the key to idempotency. Plaintext never hits stdout or the target's logs
# (no_log on every task that touches it).
# ============================================================================

- name: Ensure local secrets directory exists (controller)
  ansible.builtin.file:
    path: "{{ sysadmin_password_store | dirname }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true

- name: Generate/lookup per-user passwords (idempotent)
  ansible.builtin.set_fact:
    users_creds: >-
      {{ users_creds | default([]) + [{
        'name': item.name,
        'password': lookup('password',
                           (sysadmin_password_store | dirname) + '/' + item.name + '.pass'
                           + ' length=' + (sysadmin_password_length | string)
                           + ' chars=ascii_letters,digits,punctuation')
      }] }}
  loop: "{{ sysadmin_users }}"
  no_log: true

- name: Create sysadmin accounts
  ansible.builtin.user:
    name: "{{ item.name }}"
    password: "{{ item.password | password_hash('sha512', 65534 | random(seed=item.name) | string) }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true
    update_password: on_create   # never re-set on existing users -> idempotent
  loop: "{{ users_creds }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Install authorized SSH keys
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
  loop: "{{ sysadmin_users | subelements('ssh_authorized_keys', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}"

- name: Configure per-user sudo access
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  loop: "{{ sysadmin_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Force password change on first login
  ansible.builtin.command: "chage -d 0 {{ item.name }}"
  loop: "{{ sysadmin_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: sysadmin_force_password_reset | bool
  register: users_chage
  changed_when: false   # advisory; chage is not cleanly idempotent-reportable

- name: Persist generated credentials to controller (0600, never logged)
  ansible.builtin.copy:
    dest: "{{ sysadmin_password_store }}"
    mode: "0600"
    content: |
      # Auto-generated by Ansible for {{ inventory_hostname }} — KEEP SECRET.
      # Users must change password on first login.
      {% for c in users_creds %}
      {{ c.name }}: {{ c.password }}
      {% endfor %}
  delegate_to: localhost
  become: false
  no_log: true
